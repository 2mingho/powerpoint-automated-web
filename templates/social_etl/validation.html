{% extends "base.html" %}

{% block content %}
<div class="container-fluid py-4" style="max-width: 1600px;">
    
    <!-- Top Bar -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold text-gray-800">Validación de Datos</h1>
            <p class="text-muted mb-0">Revisa la clasificación automática antes de guardar.</p>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary" onclick="exportCSV()"><i class="fas fa-file-csv me-1"></i> Descargar CSV</button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#saveModal"><i class="fas fa-save me-1"></i> Guardar en Base de Datos</button>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card border-l-primary shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-primary text-uppercase mb-1">Total Filas</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" id="statTotal">-</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-list fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-l-warning shadow h-100 py-2">
                <div class="card-body">
                    <div class="row no-gutters align-items-center">
                        <div class="col mr-2">
                            <div class="text-xs font-weight-bold text-warning text-uppercase mb-1">Sin Clasificar</div>
                            <div class="h5 mb-0 font-weight-bold text-gray-800" id="statUnclassified">-</div>
                        </div>
                        <div class="col-auto"><i class="fas fa-exclamation-triangle fa-2x text-gray-300"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Data Table -->
    <div class="card shadow mb-4">
        <div class="card-header py-3 d-flex justify-content-between align-items-center bg-white">
            <h6 class="m-0 fw-bold text-primary">Vista Previa</h6>
            <button class="btn btn-sm btn-info text-white" onclick="reclassify()"><i class="fas fa-sync-alt me-1"></i> Re-Clasificar (Hot Reload)</button>
        </div>
        <div class="card-body p-0 table-responsive" style="max-height: 600px;">
            <table class="table table-striped table-hover mb-0" id="dataTable">
                <thead class="bg-light sticky-top">
                    <!-- Column headers generated dynamically -->
                </thead>
                <tbody>
                    <!-- Data generated dynamically -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- Save Modal -->
<div class="modal fade" id="saveModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Guardar en Base de Datos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info">
                    <small>Se intentarán mapear automáticamente las columnas del CSV a la base de datos.</small>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Plataforma Destino</label>
                    <select class="form-select" id="platformSelect">
                        <option value="instagram">Instagram</option>
                        <option value="facebook">Facebook</option>
                        <option value="linkedin">LinkedIn</option>
                        <option value="twitter">Twitter</option>
                        <option value="youtube">YouTube</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="saveData()">Confirmar Guardado</button>
            </div>
        </div>
    </div>
</div>

<script>
    const STAGED_ID = "{{ staged_id }}";
    let currentData = [];
    let currentColumns = [];

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(`/social-etl/api/validation/${STAGED_ID}/data`);
            const data = await res.json();
            
            if(data.error) {
                alert(data.error);
                return;
            }

            currentData = data.data;
            currentColumns = data.columns;
            renderStats(data.stats);
            renderTable(currentColumns, currentData);
        } catch(e) {
            console.error(e);
            alert("Error cargando datos");
        } finally {
            showLoading(false);
        }
    }

    function renderStats(stats) {
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statUnclassified').textContent = stats.unclassified;
    }

    function renderTable(cols, data) {
        const thead = document.querySelector('#dataTable thead');
        const tbody = document.querySelector('#dataTable tbody');
        
        // Headers
        let headerHtml = '<tr>';
        cols.forEach(col => {
            headerHtml += `<th class="text-nowrap">${col}</th>`;
        });
        headerHtml += '</tr>';
        thead.innerHTML = headerHtml;

        // Rows (Limit to first 1000 for performance)
        let bodyHtml = '';
        data.slice(0, 1000).forEach(row => {
            const isUnclassified = row['Categoria'] === 'Sin Clasificar' || row['Tematica'] === 'Sin Clasificar';
            const trClass = isUnclassified ? 'table-warning' : '';
            
            bodyHtml += `<tr class="${trClass}">`;
            cols.forEach(col => {
                let cellVal = row[col] || '';
                // Truncate long text
                if (cellVal.length > 50) cellVal = cellVal.substring(0, 50) + '...';
                bodyHtml += `<td>${cellVal}</td>`;
            });
            bodyHtml += `</tr>`;
        });
        
        if(data.length > 1000) {
            bodyHtml += `<tr><td colspan="${cols.length}" class="text-center text-muted">... y ${data.length - 1000} filas más.</td></tr>`;
        }
        
        tbody.innerHTML = bodyHtml;
    }

    async function reclassify() {
        if(!confirm("Esto volverá a procesar las clasificaciones usando las reglas actuales del perfil activo. ¿Continuar?")) return;
        
        showLoading(true);
        try {
            const res = await fetch(`/social-etl/api/validation/${STAGED_ID}/reclassify`, {method:'POST'});
            const result = await res.json();
            if(result.success) {
                loadData(); // reload
            } else {
                alert(result.error);
            }
        } catch(e) {
            console.error(e);
            alert("Error en reclasificación");
        } finally {
            showLoading(false);
        }
    }

    async function saveData() {
        const platform = document.getElementById('platformSelect').value;
        const modal = document.getElementById('saveModal');
        const btn = modal.querySelector('.btn-success');
        
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner-border spinner-border-sm"></div> Guardando...';

        try {
            const res = await fetch(`/social-etl/api/validation/${STAGED_ID}/save`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ platform: platform })
            });
            const result = await res.json();
            
            if(result.success) {
                alert(`¡Guardado exitoso! ${result.inserted_count} filas insertadas.`);
                // Close modal first
                const bsModal = bootstrap.Modal.getInstance(modal);
                if(bsModal) bsModal.hide();
                // Redirect after short delay
                setTimeout(() => {
                    window.location.href = result.redirect_url || "/social-etl/dashboard";
                }, 500);
            } else {
                alert("Error: " + result.error);
                btn.disabled = false;
                btn.textContent = 'Confirmar Guardado';
            }
        } catch(e) {
            console.error(e);
            alert("Error al guardar");
            btn.disabled = false;
            btn.textContent = 'Confirmar Guardado';
        }
    }

    function exportCSV() {
        window.location.href = `/social-etl/api/validation/${STAGED_ID}/download`;
    }

    function showLoading(show) {
        // Simple loading indicator
        const table = document.getElementById('dataTable');
        if(show) {
            table.style.opacity = '0.5';
            table.style.pointerEvents = 'none';
        } else {
            table.style.opacity = '1';
            table.style.pointerEvents = 'auto';
        }
    }
</script>
{% endblock %}
